services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"

  redis-test:
    image: redis:7
    # Port 6380 on host so it doesn't clash with dev Redis on 6379
    ports:
      - "6380:6379"