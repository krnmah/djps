services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://djps:djps@postgres:5432/djps
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -u scripts/start_worker.py
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+psycopg2://djps:djps@postgres:5432/djps
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: djps
      POSTGRES_PASSWORD: djps
      POSTGRES_DB: djps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djps -d djps"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Load testing (profile: load)
  # Usage:
  #   docker compose --profile load run --rm k6 run /scripts/smoke.js
  #   docker compose --profile load run --rm k6 run /scripts/load.js
  #   docker compose --profile load run --rm k6 run /scripts/spike.js
  k6:
    image: grafana/k6:0.55.0
    profiles:
      - load
    volumes:
      - ../tests/load:/scripts:ro
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    networks:
      - default

volumes:
  postgres_data:
  grafana_data: